name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish & pack module
        run: dotnet publish Sentry/Sentry.csproj --configuration Release -o publish

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenShock.Sentry.module
          path: publish/OpenShock.Sentry.module.zip
          if-no-files-found: error

  # Create a draft GitHub release for stable tags (skip -rc.* prereleases)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc.') }}
    permissions:
      contents: write
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenShock.Sentry.module
          path: artifacts/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/OpenShock.Sentry.module.zip
