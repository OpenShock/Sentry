name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Publish & pack module
        run: dotnet publish Sentry/Sentry.csproj --configuration Release -o publish

      - name: Upload module artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: OpenShock.Sentry.module
          path: publish/OpenShock.Sentry.module.zip
          if-no-files-found: error

  # Create a draft GitHub release for stable tags (skip -rc.* prereleases)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc.') }}
    permissions:
      contents: write
    steps:
      - name: Download module artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: OpenShock.Sentry.module
          path: artifacts/

      - name: Create draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/OpenShock.Sentry.module.zip
